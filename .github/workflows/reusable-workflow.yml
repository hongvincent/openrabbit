# openrabbit — reusable review workflow (PRD §11 control plane, §12 CI hardening).
#
# A thin caller workflow in each onboarded repo invokes this via `uses:` with
# `workflow_call`. All review logic lives here so a single central SHA bump rolls
# the whole fleet forward.
#
# Security posture (SPEC §12):
#   * Top-level permissions are least-privilege `contents: read`.
#   * `pull-requests: write` is elevated ONLY on the review job (to post the
#     review) — never at the top level.
#   * `id-token: write` enables GitHub OIDC -> STS `AssumeRoleWithWebIdentity`
#     for KEYLESS Bedrock auth (no long-lived AWS keys).
#   * Every third-party action is SHA-pinned to a 40-hex commit (with a trailing
#     version comment) so the supply chain is immutable; bump via Dependabot.
#   * The PR diff is untrusted data — openrabbit fences it and the reasoning
#     layer holds no write credentials (advisory-only).
name: openrabbit review (reusable)

on:
  workflow_call:
    inputs:
      pr:
        description: "Pull request number to review."
        required: true
        type: string
      commit:
        description: "Head commit SHA being reviewed."
        required: true
        type: string
      config:
        description: "Path to .openrabbit.yaml (model_roles, lenses, gates)."
        required: false
        type: string
        default: ".openrabbit.yaml"
      aws_region:
        description: "Primary AWS region for OIDC/STS + the Nova model (e.g. ap-northeast-2)."
        required: false
        type: string
        default: "us-east-2"
      verifier_region:
        description: >-
          AWS region for the GPT-5.5 verifier's Bedrock bearer token. GPT-5.5
          lives ONLY on the bedrock-mantle us-east-1/us-east-2 endpoint, so this
          is independent of the Nova `aws_region` (a token minted for the Nova
          region is rejected by the mantle endpoint — 401).
        required: false
        type: string
        default: "us-east-2"
      python_version:
        description: "Python version used to run openrabbit."
        required: false
        type: string
        default: "3.12"
      runner:
        description: "Runner label for the review job."
        required: false
        type: string
        default: "ubuntu-latest"
    secrets:
      aws_role_arn:
        description: "ARN of the IAM role to assume for Bedrock (OIDC trust)."
        required: true

# Least privilege by default; jobs elevate only what they need.
permissions:
  contents: read

jobs:
  review:
    # Job NAME is deterministic and stable: GitHub reports the check for a
    # reusable-workflow job as "<caller job name> / <reusable job name>". Both
    # onboarding paths name the caller job "openrabbit" (the org template sets
    # `name: openrabbit`; the init-generated caller uses job id `openrabbit` with
    # no name, which GitHub renders as "openrabbit"), so the reported check is
    # exactly "openrabbit / review". The org ruleset + safe-settings require that
    # exact composite context. Do NOT rename without updating both.
    name: review
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read          # read the checked-out code for enclosing context
      pull-requests: write    # post the review (inline comments + walkthrough)
      id-token: write         # OIDC -> STS AssumeRoleWithWebIdentity (keyless Bedrock)
    steps:
      # Fetch enough history that openrabbit can compute the incremental diff and
      # read enclosing context. fetch-depth: 0 = full history (tuned for diff).
      - name: Checkout PR head
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: ${{ inputs.commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          python-version: ${{ inputs.python_version }}

      # NB: openrabbit is installed at RUN TIME via `uv run --with git+...`
      # (see the review step). We deliberately do NOT `uv sync` here: this runner
      # has the REVIEWED repo checked out, which may be Node/Go/etc. with no
      # Python pyproject.toml — `uv sync` would error or sync the wrong project,
      # and the `openrabbit` console script would never be on PATH. The
      # `<OWNER>/<PINNED_SHA>` tokens in the review step are DELIBERATE
      # placeholders the onboarding owner replaces (Dependabot bumps the pin).

      # Keyless Bedrock auth: exchange the GitHub OIDC token for short-lived STS
      # credentials by assuming the trust-pinned role. No static AWS secrets.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b  # v6.2.0
        with:
          role-to-assume: ${{ secrets.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}
          role-session-name: openrabbit-review-${{ github.run_id }}

      # GPT-5.5 verifier auth. `configure-aws-credentials` above yields raw STS
      # creds, but the OpenAI-compatible Bedrock endpoint (GPT-5.5) authenticates
      # with a short-lived BEARER token, not SigV4. Derive that token from the
      # STS creds already in the environment and export it (masked) to later
      # steps via $GITHUB_ENV. Minted UNCONDITIONALLY: the shipped default
      # .openrabbit.yaml configures an openai.* verifier, and an extra token on a
      # config without one is harmless (the verifier provider simply never reads
      # it).
      #
      # CRITICAL — region: the token is minted for `verifier_region` (default
      # us-east-2), NOT the Nova `aws_region`. GPT-5.5 lives only on the
      # bedrock-mantle us-east-1/us-east-2 endpoint; `provide_token(region=...)`
      # bakes the region into the token's SigV4 scope, so a token minted for the
      # Nova region (e.g. ap-northeast-2 Seoul) is rejected by the mantle
      # endpoint (401).
      - name: Mint Bedrock bearer token (GPT-5.5 verifier)
        env:
          OR_VERIFIER_REGION: ${{ inputs.verifier_region }}
        run: |
          python3 -m pip install --quiet --disable-pip-version-check "aws-bedrock-token-generator==1.1.0"
          TOKEN=$(python3 -c "import os; from aws_bedrock_token_generator import provide_token; print(provide_token(region=os.environ['OR_VERIFIER_REGION']))")
          echo "::add-mask::$TOKEN"
          echo "AWS_BEARER_TOKEN_BEDROCK=$TOKEN" >> "$GITHUB_ENV"
          echo "Minted short-lived Bedrock bearer token (masked) for verifier region $OR_VERIFIER_REGION"

      - name: Run openrabbit review
        # GitHub-hardening: never inline ${{ }} into a run script. Pass every
        # value through env: and reference it as a QUOTED shell var so a future
        # caller that wires free-text into config/commit cannot inject commands
        # (the runner holds the OIDC/Bedrock role — runner RCE would be material).
        #
        # `uv run --with git+...openrabbit@<PINNED_SHA>` installs openrabbit
        # ITSELF (independent of the reviewed repo) into an ephemeral env and runs
        # its console script. Replace <OWNER>/<PINNED_SHA> with your org + the
        # vetted release SHA (Dependabot keeps it current). AWS_BEARER_TOKEN_BEDROCK
        # is inherited from $GITHUB_ENV (minted above) for the GPT-5.5 verifier.
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OR_REPO: ${{ github.repository }}
          OR_PR: ${{ inputs.pr }}
          OR_COMMIT: ${{ inputs.commit }}
          OR_CONFIG: ${{ inputs.config }}
        run: >-
          uv run
          --with git+https://github.com/<OWNER>/openrabbit@<PINNED_SHA>
          openrabbit review
          --repo "$OR_REPO"
          --pr "$OR_PR"
          --commit "$OR_COMMIT"
          --config "$OR_CONFIG"
          --bot-login "github-actions[bot]"
          --post
