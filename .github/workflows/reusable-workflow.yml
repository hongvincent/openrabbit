# openrabbit — reusable review workflow (PRD §11 control plane, §12 CI hardening).
#
# A thin caller workflow in each onboarded repo invokes this via `uses:` with
# `workflow_call`. All review logic lives here so a single central SHA bump rolls
# the whole fleet forward.
#
# Security posture (SPEC §12):
#   * Top-level permissions are least-privilege `contents: read`.
#   * `pull-requests: write` is elevated ONLY on the review job (to post the
#     review) — never at the top level.
#   * `id-token: write` enables GitHub OIDC -> STS `AssumeRoleWithWebIdentity`
#     for KEYLESS Bedrock auth (no long-lived AWS keys).
#   * Every third-party action is SHA-pinned to a 40-hex commit (with a trailing
#     version comment) so the supply chain is immutable; bump via Dependabot.
#   * The PR diff is untrusted data — openrabbit fences it and the reasoning
#     layer holds no write credentials (advisory-only).
name: openrabbit review (reusable)

on:
  workflow_call:
    inputs:
      pr:
        description: "Pull request number to review."
        required: true
        type: string
      commit:
        description: "Head commit SHA being reviewed."
        required: true
        type: string
      config:
        description: "Path to .openrabbit.yaml (model_roles, lenses, gates)."
        required: false
        type: string
        default: ".openrabbit.yaml"
      base_ref:
        description: >-
          PR base branch name (e.g. "main"). The review POLICY (gate / lenses /
          path_filters) is anchored to the TRUSTED base config, not the
          attacker-controlled PR head (SPEC §12 trust boundary). The caller pipes
          ``github.base_ref`` here; this workflow fetches ``origin/<base_ref>`` and
          passes ``--base-ref origin/<base_ref>`` to the review (the checkout is a
          detached-HEAD on the head commit, so a bare branch name would not
          resolve). Empty (manual dispatch with no PR base) skips re-anchoring.
        required: false
        type: string
        default: ""
      aws_region:
        description: "Primary AWS region for OIDC/STS + the Nova model (e.g. ap-northeast-2)."
        required: false
        type: string
        default: "us-east-2"
      verifier_region:
        description: >-
          AWS region for the GPT verifier's Bedrock bearer token (default model
          openai.gpt-5.4; gpt-5.5 also supported). Both live ONLY on the
          bedrock-mantle us-east-1/us-east-2 endpoint, so this is independent of
          the Nova `aws_region` (a token minted for the Nova region is rejected by
          the mantle endpoint — 401).
        required: false
        type: string
        default: "us-east-2"
      python_version:
        description: "Python version used to run openrabbit."
        required: false
        type: string
        default: "3.12"
      runner:
        description: "Runner label for the review job."
        required: false
        type: string
        default: "ubuntu-latest"
    secrets:
      aws_role_arn:
        description: "ARN of the IAM role to assume for Bedrock (OIDC trust)."
        required: true

# Least privilege by default; jobs elevate only what they need.
permissions:
  contents: read

jobs:
  review:
    # Job NAME is deterministic and stable: GitHub reports the check for a
    # reusable-workflow job as "<caller job name> / <reusable job name>". Both
    # onboarding paths name the caller job "openrabbit" (the org template sets
    # `name: openrabbit`; the init-generated caller uses job id `openrabbit` with
    # no name, which GitHub renders as "openrabbit"), so the reported check is
    # exactly "openrabbit / review". The org ruleset + safe-settings require that
    # exact composite context. Do NOT rename without updating both.
    name: review
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read          # read the checked-out code for enclosing context
      pull-requests: write    # post the review (inline comments + walkthrough)
      id-token: write         # OIDC -> STS AssumeRoleWithWebIdentity (keyless Bedrock)
    steps:
      # Fetch enough history that openrabbit can compute the incremental diff and
      # read enclosing context. fetch-depth: 0 = full history (tuned for diff).
      - name: Checkout PR head
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: ${{ inputs.commit }}
          fetch-depth: 0
          persist-credentials: false

      # Trust-boundary prerequisite (SPEC §12): the checkout above is a
      # detached-HEAD on the PR head commit, so the base branch ref does NOT
      # exist locally — ``git show <base>:.openrabbit.yaml`` would fail and the
      # policy would silently degrade to the untrusted head config. Fetch the
      # base branch so ``origin/<base_ref>`` resolves, then the review step passes
      # ``--base-ref origin/<base_ref>`` and cli.py anchors gate/lenses/path_filters
      # to the trusted base. Skipped when no base ref is provided (e.g. manual
      # dispatch). Value flows through env (never inlined ${{ }} into the script).
      - name: Fetch base branch (policy trust anchor)
        if: ${{ inputs.base_ref != '' }}
        env:
          OR_BASE_REF: ${{ inputs.base_ref }}
          OR_GH_TOKEN: ${{ github.token }}
        run: |
          # The checkout ran with persist-credentials:false (hardening), so the
          # git credential helper is gone. Authenticate THIS fetch via one-shot
          # env-based git config: GIT_CONFIG_* is NOT written to .git/config, so
          # the checked-out PR code cannot read the token (unlike `git config`).
          # Required for PRIVATE consumer repos — a bare fetch is anonymous and
          # 128s ("could not read Username for 'https://github.com'").
          b64=$(printf 'x-access-token:%s' "$OR_GH_TOKEN" | base64 | tr -d '\n')
          export GIT_CONFIG_COUNT=1
          export GIT_CONFIG_KEY_0=http.extraheader
          export GIT_CONFIG_VALUE_0="AUTHORIZATION: basic ${b64}"
          git fetch --no-tags --depth=1 origin "+refs/heads/${OR_BASE_REF}:refs/remotes/origin/${OR_BASE_REF}"
          echo "Fetched base branch origin/${OR_BASE_REF} for policy trust anchor"

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          python-version: ${{ inputs.python_version }}

      # NB: openrabbit is installed at RUN TIME via `uv run --with git+...`
      # (see the review step). We deliberately do NOT `uv sync` here: this runner
      # has the REVIEWED repo checked out, which may be Node/Go/etc. with no
      # Python pyproject.toml — `uv sync` would error or sync the wrong project,
      # and the `openrabbit` console script would never be on PATH. The
      # `<OWNER>/<PINNED_SHA>` tokens in the review step are DELIBERATE
      # placeholders the onboarding owner replaces (Dependabot bumps the pin).

      # Keyless Bedrock auth: exchange the GitHub OIDC token for short-lived STS
      # credentials by assuming the trust-pinned role. No static AWS secrets.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b  # v6.2.0
        with:
          role-to-assume: ${{ secrets.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}
          role-session-name: openrabbit-review-${{ github.run_id }}

      # GPT verifier auth (default openai.gpt-5.4; gpt-5.5 also supported).
      # `configure-aws-credentials` above yields raw STS creds, but the
      # OpenAI-compatible Bedrock endpoint authenticates with a short-lived BEARER
      # token, not SigV4. Derive that token from the STS creds already in the
      # environment and export it (masked) to later steps via $GITHUB_ENV. Minted
      # UNCONDITIONALLY: the shipped default .openrabbit.yaml configures an
      # openai.* verifier, and an extra token on a config without one is harmless
      # (the verifier provider simply never reads it).
      #
      # CRITICAL — region: the token is minted for `verifier_region` (default
      # us-east-2), NOT the Nova `aws_region`. Both gpt-5.4 and gpt-5.5 live only
      # on the bedrock-mantle us-east-1/us-east-2 endpoint; `provide_token(region=...)`
      # bakes the region into the token's SigV4 scope, so a token minted for the
      # Nova region (e.g. ap-northeast-2 Seoul) is rejected by the mantle
      # endpoint (401).
      - name: Mint Bedrock bearer token (GPT-5.4/5.5 verifier)
        env:
          OR_VERIFIER_REGION: ${{ inputs.verifier_region }}
        run: |
          python3 -m pip install --quiet --disable-pip-version-check "aws-bedrock-token-generator==1.1.0"
          TOKEN=$(python3 -c "import os; from aws_bedrock_token_generator import provide_token; print(provide_token(region=os.environ['OR_VERIFIER_REGION']))")
          echo "::add-mask::$TOKEN"
          echo "AWS_BEARER_TOKEN_BEDROCK=$TOKEN" >> "$GITHUB_ENV"
          echo "Minted short-lived Bedrock bearer token (masked) for verifier region $OR_VERIFIER_REGION"

      - name: Run openrabbit review
        # GitHub-hardening: never inline ${{ }} into a run script. Pass every
        # value through env: and reference it as a QUOTED shell var so a future
        # caller that wires free-text into config/commit cannot inject commands
        # (the runner holds the OIDC/Bedrock role — runner RCE would be material).
        #
        # `uv run --with git+...openrabbit@<PINNED_SHA>` installs openrabbit
        # ITSELF (independent of the reviewed repo) into an ephemeral env and runs
        # its console script. Replace <OWNER>/<PINNED_SHA> with your org + the
        # vetted release SHA (Dependabot keeps it current). AWS_BEARER_TOKEN_BEDROCK
        # is inherited from $GITHUB_ENV (minted above) for the verifier (the
        # default config ships openai.gpt-5.4; gpt-5.5 is also supported, same
        # mantle region constraint).
        #
        # ``--base-ref origin/<base>`` anchors the review POLICY to the trusted
        # base config (SPEC §12 trust boundary). It is appended only when a base
        # ref was provided AND the fetch above made ``origin/<base>`` resolvable;
        # on a manual run with no PR base it is omitted (cli.py then keeps the head
        # policy).
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OR_REPO: ${{ github.repository }}
          OR_PR: ${{ inputs.pr }}
          OR_COMMIT: ${{ inputs.commit }}
          OR_CONFIG: ${{ inputs.config }}
          OR_BASE_REF: ${{ inputs.base_ref }}
        run: |
          base_ref_args=()
          if [ -n "$OR_BASE_REF" ]; then
            base_ref_args+=(--base-ref "origin/$OR_BASE_REF")
          fi
          uv run \
            --no-project \
            --with git+https://github.com/hongvincent/openrabbit@99fc22887f237099fd2acfdda553834f977dfb44 \
            openrabbit review \
            --repo "$OR_REPO" \
            --pr "$OR_PR" \
            --commit "$OR_COMMIT" \
            --config "$OR_CONFIG" \
            --bot-login "github-actions[bot]" \
            "${base_ref_args[@]}" \
            --post
