# openrabbit — composite action (PRD §11). A step-form alternative to the
# reusable workflow for repos that prefer wiring openrabbit into an existing job
# rather than calling a separate `workflow_call` workflow.
#
# The CALLER is responsible for granting least-privilege permissions on the job
# that uses this action:
#
#   permissions:
#     contents: read
#     pull-requests: write   # to post the review
#     id-token: write        # OIDC -> STS keyless Bedrock auth
#
# Every third-party action is SHA-pinned to a 40-hex commit with a trailing
# version comment (SPEC §12 supply-chain hardening). The PR diff is untrusted
# data; the reasoning layer holds no write credentials (advisory-only).
name: openrabbit review
description: >-
  Run the openrabbit high-trust AI code review on a pull request using keyless
  AWS Bedrock auth (GitHub OIDC -> STS). Posts an advisory review.
author: openrabbit

inputs:
  pr:
    description: "Pull request number to review."
    required: true
  commit:
    description: "Head commit SHA being reviewed."
    required: true
  config:
    description: "Path to .openrabbit.yaml (model_roles, lenses, gates)."
    required: false
    default: ".openrabbit.yaml"
  aws_role_arn:
    description: "ARN of the IAM role to assume for Bedrock (OIDC trust)."
    required: true
  aws_region:
    description: "Primary AWS region for OIDC/STS + the Nova model (e.g. ap-northeast-2)."
    required: false
    default: "us-east-2"
  verifier_region:
    description: >-
      AWS region for the GPT verifier's Bedrock bearer token (default model
      openai.gpt-5.4; gpt-5.5 also supported). Both live ONLY on the
      bedrock-mantle us-east-1/us-east-2 endpoint, so this is independent of the
      Nova `aws_region` (a token minted for the Nova region is rejected by the
      mantle endpoint — 401).
    required: false
    default: "us-east-2"
  python_version:
    description: "Python version used to run openrabbit."
    required: false
    default: "3.12"
  github_token:
    description: "Token used to read the PR diff and post the review."
    required: false
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    # Full history so openrabbit can compute the incremental diff and read
    # enclosing context (fetch-depth tuned for diff).
    - name: Checkout PR head
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      with:
        ref: ${{ inputs.commit }}
        fetch-depth: 0
        persist-credentials: false

    # Trust-boundary prerequisite (SPEC §12): the checkout above is a
    # detached-HEAD on the PR head commit, so the base branch ref does NOT exist
    # locally — ``git show <base>:.openrabbit.yaml`` would fail and the policy
    # would silently degrade to the untrusted head config. A composite action runs
    # inside the caller's pull_request job, so ``github.base_ref`` is the PR target
    # branch. Fetch it so ``origin/<base>`` resolves; the review step then passes
    # ``--base-ref origin/<base>`` and cli.py anchors gate/lenses/path_filters to
    # the trusted base. Skipped when github.base_ref is empty (non-PR event).
    - name: Fetch base branch (policy trust anchor)
      if: ${{ github.base_ref != '' }}
      shell: bash
      env:
        OR_BASE_REF: ${{ github.base_ref }}
        OR_GH_TOKEN: ${{ github.token }}
      run: |
        # persist-credentials:false stripped the checkout's git credential helper,
        # so authenticate THIS fetch via one-shot env-based git config (GIT_CONFIG_*
        # is NOT written to .git/config, so the checked-out PR code cannot read the
        # token). Required for PRIVATE consumer repos — a bare anonymous fetch 128s
        # ("could not read Username for 'https://github.com'").
        b64=$(printf 'x-access-token:%s' "$OR_GH_TOKEN" | base64 | tr -d '\n')
        export GIT_CONFIG_COUNT=1
        export GIT_CONFIG_KEY_0=http.extraheader
        export GIT_CONFIG_VALUE_0="AUTHORIZATION: basic ${b64}"
        git fetch --no-tags --depth=1 origin "+refs/heads/${OR_BASE_REF}:refs/remotes/origin/${OR_BASE_REF}"
        echo "Fetched base branch origin/${OR_BASE_REF} for policy trust anchor"

    - name: Set up uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      with:
        python-version: ${{ inputs.python_version }}

    # NB: openrabbit is installed at RUN TIME via `uv run --with git+...` (see the
    # review step). We deliberately do NOT `uv sync` here: this runner has the
    # REVIEWED repo checked out, which may be Node/Go/etc. with no Python
    # pyproject.toml — `uv sync` would error or sync the wrong project, and the
    # `openrabbit` console script would never be on PATH. The `<OWNER>/<PINNED_SHA>`
    # tokens in the review step are DELIBERATE placeholders the onboarding owner
    # replaces (Dependabot bumps the pin).

    # Keyless Bedrock auth via OIDC -> STS. No static AWS secrets.
    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b  # v6.2.0
      with:
        role-to-assume: ${{ inputs.aws_role_arn }}
        aws-region: ${{ inputs.aws_region }}
        role-session-name: openrabbit-review-${{ github.run_id }}

    # GPT verifier auth (default openai.gpt-5.4; gpt-5.5 also supported).
    # `configure-aws-credentials` above yields raw STS creds, but the
    # OpenAI-compatible Bedrock endpoint authenticates with a short-lived BEARER
    # token, not SigV4. Derive that token from the STS creds already in the
    # environment and export it (masked) to later steps via $GITHUB_ENV. Minted
    # UNCONDITIONALLY: the shipped default .openrabbit.yaml configures an openai.*
    # verifier, and an extra token on a config without one is harmless (the
    # verifier provider simply never reads it).
    #
    # CRITICAL — region: the token is minted for `verifier_region` (default
    # us-east-2), NOT the Nova `aws_region`. Both gpt-5.4 and gpt-5.5 live only on
    # the bedrock-mantle us-east-1/us-east-2 endpoint; `provide_token(region=...)`
    # bakes the region into the token's SigV4 scope, so a token minted for the
    # Nova region (e.g. ap-northeast-2 Seoul) is rejected by the mantle endpoint
    # (401).
    - name: Mint Bedrock bearer token (GPT-5.4/5.5 verifier)
      shell: bash
      env:
        OR_VERIFIER_REGION: ${{ inputs.verifier_region }}
      run: |
        python3 -m pip install --quiet --disable-pip-version-check "aws-bedrock-token-generator==1.1.0"
        TOKEN=$(python3 -c "import os; from aws_bedrock_token_generator import provide_token; print(provide_token(region=os.environ['OR_VERIFIER_REGION']))")
        echo "::add-mask::$TOKEN"
        echo "AWS_BEARER_TOKEN_BEDROCK=$TOKEN" >> "$GITHUB_ENV"
        echo "Minted short-lived Bedrock bearer token (masked) for verifier region $OR_VERIFIER_REGION"

    - name: Run openrabbit review
      shell: bash
      # GitHub-hardening: never inline ${{ }} into a run script. Pass every value
      # through env: and reference it as a QUOTED shell var so a future caller
      # that wires free-text into config/commit cannot inject commands (the
      # runner holds the OIDC/Bedrock role — runner RCE would be material).
      #
      # `uv run --with git+...openrabbit@<PINNED_SHA>` installs openrabbit ITSELF
      # (independent of the reviewed repo) into an ephemeral env and runs its
      # console script. Replace <OWNER>/<PINNED_SHA> with your org + the vetted
      # release SHA (Dependabot keeps it current). AWS_BEARER_TOKEN_BEDROCK is
      # inherited from $GITHUB_ENV (minted above) for the verifier (the default
      # config ships openai.gpt-5.4; gpt-5.5 is also supported, same mantle
      # region constraint).
      #
      # ``--base-ref origin/<base>`` anchors the review POLICY to the trusted base
      # config (SPEC §12 trust boundary). It is appended only on a PR event (when
      # github.base_ref is set AND the fetch above made origin/<base> resolvable);
      # on a non-PR event it is omitted (cli.py then keeps the head policy).
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        OR_REPO: ${{ github.repository }}
        OR_PR: ${{ inputs.pr }}
        OR_COMMIT: ${{ inputs.commit }}
        OR_CONFIG: ${{ inputs.config }}
        OR_BASE_REF: ${{ github.base_ref }}
      run: |
        base_ref_args=()
        if [ -n "$OR_BASE_REF" ]; then
          base_ref_args+=(--base-ref "origin/$OR_BASE_REF")
        fi
        uv run \
          --with git+https://github.com/hongvincent/openrabbit@eb27df197972200758b008d89dffba51db742225 \
          openrabbit review \
          --repo "$OR_REPO" \
          --pr "$OR_PR" \
          --commit "$OR_COMMIT" \
          --config "$OR_CONFIG" \
          --bot-login "github-actions[bot]" \
          "${base_ref_args[@]}" \
          --post
