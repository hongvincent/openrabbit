# .openrabbit.yaml — config-as-code (SPEC 8.2). Copy to ".openrabbit.yaml".
# Additive / versioned. Model ids are BYO Bedrock model/inference-profile ids.
version: 1

review:
  profile: balanced            # chill | balanced | assertive
  confidence_gate: 0.80        # drop findings below this calibrated confidence
  verify_min_severity: high    # route only >= this severity through the (expensive,
                               # cross-family) verifier; lesser findings use the
                               # cheaper finder-confidence + gate path
                               # (critical | high | medium | low | nit)
  always_verify_categories: [correctness, security]
                               # TRUST-CORE lenses: route through the verifier
                               # REGARDLESS of severity, so a hallucinated
                               # medium/correctness finding is re-checked (and
                               # refuted) instead of posting blind. Set [] to
                               # disable (only severity governs routing).
  unverified_confidence_gate: 0.9
                               # higher finder-confidence bar a finding must clear
                               # to post UN-verified (it bypassed the verifier:
                               # below verify_min_severity AND not trust-core).
                               # Must be >= confidence_gate. Drops low/maintainability
                               # nitpicks at ~0.8 the verifier never vetted.
  response_language: en        # language of USER-FACING review text: en | ko
                               # (aliases english/korean/한국어 normalize to en/ko).
                               # When ko, finding title/description AND the
                               # walkthrough's labels are written in Korean while
                               # the models REASON in English (verification stays
                               # robust). en (default) is unchanged.
  persona: true                # rabbit branding (it's openRABBIT 🐰). true
                               # (default) brands the posted walkthrough with a 🐰
                               # in the heading + a one-line sign-off (localized to
                               # response_language). Set false for plain, neutral
                               # output (no emoji, no sign-off) if your team prefers.
  incremental: true            # review diff since last_reviewed_sha when available
  path_filters:
    - "!**/dist/**"
    - "!**/*.lock"
    - "!**/generated/**"
  path_instructions:
    - path: "src/api/**"
      instructions: "focus on authn/authz and input validation"
  lenses: [correctness, security, performance, tests, maintainability]
  # Per-lens finder reasoning effort (Nova 2 extended-thinking). Threaded into
  # the finder Converse call as additionalModelRequestFields.reasoningConfig =
  # {type: enabled, maxReasoningEffort: <low|medium|high>} (LIVE-VERIFIED shape
  # on global.amazon.nova-2-lite-v1:0 in ap-northeast-2). A lens OMITTED below
  # runs with reasoning DISABLED (Nova 2 default type: "disabled"), i.e. a
  # plain non-thinking pass. Research-decided: LOW reasoning for the
  # logic/security lenses; OFF for the cheaper style/test lenses.
  lens_reasoning_effort:
    correctness: low           # logic/correctness — LOW effort reasoning
    security: low              # security — LOW effort reasoning
    # performance/tests/maintainability OMITTED => reasoning OFF (cheaper pass)

model_roles:                   # role -> { model, region, ...provider opts }
  triage:
    model: global.amazon.nova-2-lite-v1:0   # Nova 2 Lite via "global." profile
    region: ap-northeast-2                  # Seoul (LIVE-VERIFIED on Converse)
  finder:
    model: global.amazon.nova-2-lite-v1:0
    region: ap-northeast-2
    # Reasoning effort is applied PER LENS via review.lens_reasoning_effort
    # above (not a single finder-role knob): the finder runs LOW-effort
    # reasoning only for the lenses that benefit (correctness/security) and a
    # plain pass for the rest, controlling cost. Nova 2 Lite reasoningConfig is
    # LIVE-VERIFIED on this same global profile (no us.* profile needed).
  verifier:
    model: openai.gpt-5.4
    region: us-east-2
    reasoning_effort: medium   # escalate to high for security/deep lens findings
    store: false
  premium:                     # optional, cost-gated
    model: openai.gpt-5.4
    region: us-east-2
    reasoning_effort: high
    enabled: false

external_tools:                # deterministic graders fed into context
  enabled: [ruff, eslint, semgrep, gitleaks]

telemetry:
  enabled: true
  mode: opt-out                # opt-in | opt-out
